# =============================================================================
# Curated companies scraped via their PUBLIC Greenhouse / Lever job boards.
# No auth, no API keys. Chosen because they are Canadian and/or remote-first and
# routinely hire in-house counsel, compliance, privacy, and contracts roles
# (fintech & crypto companies especially hire a lot of legal/compliance staff).
#
# Each entry:
#   slug          (required)  platform-specific board id
#   platform      (required)  greenhouse | lever
#   display_name  (optional)  override the auto-title-cased company name
#   tags          (optional)  free-form labels for `scrape --tag X`
#   enabled       (optional)  default true; set false to skip
#
# All slugs below were confirmed live with `python -m jobfinder.cli verify`.
# Re-run verify periodically and set enabled:false on any that 404.
#
# NOTE: many Canadian scale-ups (Clio, Trulioo, 1Password, Benevity, Vidyard,
# Ada, Remitly, Jobber, Lightspeed) use Ashby / Workday / SmartRecruiters, which
# this tool does NOT scrape — track those manually, or add an Ashby scraper (v2).
# =============================================================================
companies:
  # --- Canadian / Canadian-founded -------------------------------------------
  - { slug: wealthsimple, platform: lever, tags: [canada, fintech, compliance, remote-first] }
  - { slug: hootsuite, platform: greenhouse, tags: [canada, remote-first] }
  - { slug: thinkific, platform: greenhouse, tags: [canada, remote-first] }
  - { slug: faire, platform: greenhouse, tags: [canada, marketplace, remote-first] }

  # --- Fintech / crypto (heavy legal, compliance, privacy, regulatory) -------
  - { slug: coinbase, platform: greenhouse, tags: [fintech, crypto, compliance] }
  - { slug: plaid, platform: lever, tags: [fintech, compliance] }
  - { slug: affirm, platform: greenhouse, tags: [fintech, compliance, remote-first] }
  - { slug: brex, platform: greenhouse, tags: [fintech, compliance, remote-first] }
  - { slug: robinhood, platform: greenhouse, tags: [fintech, compliance] }
  - { slug: gusto, platform: greenhouse, tags: [fintech, hr] }
  - { slug: ripple, platform: greenhouse, tags: [crypto, compliance] }
  - { slug: gemini, platform: greenhouse, tags: [crypto, compliance] }
  - { slug: fireblocks, platform: greenhouse, tags: [crypto, compliance] }

  # --- Remote-first tech (hire CA + remote counsel, privacy, contracts) ------
  - { slug: gitlab, platform: greenhouse, tags: [remote-first] }
  - { slug: mongodb, platform: greenhouse, tags: [data, remote-first] }
  - { slug: cloudflare, platform: greenhouse, tags: [infra, remote-first] }
  - { slug: twilio, platform: greenhouse, tags: [infra, remote-first] }
  - { slug: elastic, platform: greenhouse, tags: [data, remote-first] }
  - { slug: grafanalabs, platform: greenhouse, display_name: Grafana Labs, tags: [infra, remote-first] }
  - { slug: dropbox, platform: greenhouse, tags: [remote-first] }
  - { slug: reddit, platform: greenhouse, tags: [remote-first] }
  - { slug: stripe, platform: greenhouse, tags: [fintech] }
  - { slug: anthropic, platform: greenhouse, tags: [ai] }
  - { slug: databricks, platform: greenhouse, tags: [data] }
